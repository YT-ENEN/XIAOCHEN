<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" href="MARK.ico" type="image/x-icon">
    <title>XIAOCHEN | 購買須知</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+TC:wght@300;500&display=swap');
        
        :root { --accent: #00f2ff; --glass: rgba(25, 25, 30, 0.7); }
        html { scroll-behavior: smooth; height: 100%; }
        
        .bg-iframe { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; border: none; z-index: -100; pointer-events: none; }
        
        body { margin: 0; background: transparent; color: #fff; font-family: 'Noto Sans TC', sans-serif; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        .content-wrapper { flex: 1; display: flex; flex-direction: column; }
        
        /* 導覽列 */
        nav { position: fixed; top: 0; width: 100%; padding: 10px 50px; box-sizing: border-box; background: rgba(5,5,5,0.6); backdrop-filter: blur(15px); display: flex; justify-content: space-between; align-items: center; z-index: 1000; border-bottom: 1px solid rgba(0,242,255,0.2); }
        .nav-logo img { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; display: block; }
        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-links a { color: #fff; text-decoration: none; font-size: 0.9rem; transition: 0.3s; letter-spacing: 2px; }
        .nav-links a:hover { color: var(--accent); }
        .nav-socials { display: flex; gap: 10px; align-items: center; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(0,242,255,0.2); padding: 5px 15px; border-radius: 50px; }
        .social-icon { width: 36px; height: 36px; border-radius: 50%; transition: 0.3s; filter: drop-shadow(0 0 2px rgba(255,255,255,0.2)); }
        .social-icon:hover { transform: scale(1.2); filter: drop-shadow(0 0 8px var(--accent)); }

        /* 標題區 */
        .page-header { margin-top: 120px; text-align: center; padding: 20px; }
        .page-header h1 { font-family: 'Orbitron', sans-serif; font-size: 3.5rem; letter-spacing: 8px; margin: 0; color: var(--accent); text-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .page-header p { letter-spacing: 3px; color: #ccc; margin-top: 10px; }
        
        /* 網格系統：電腦版最多 3 個一排 */
        .account-grid { max-width: 1020px; margin: 30px auto 50px auto; padding: 0 20px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; width: 100%; box-sizing: border-box; }
        
        /* 須知圖卡外框 */
        .acc-card { 
            background: var(--glass); 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 15px; 
            overflow: hidden; 
            transition: 0.4s; 
            cursor: pointer;
            box-sizing: border-box;
        }
        .acc-card:hover { border-color: var(--accent); transform: translateY(-10px); box-shadow: 0 10px 30px rgba(0,242,255,0.15); }
        
        /* 圖片比例控制：固定寬高比 300:415 */
        .acc-cover { 
            width: 100%; 
            aspect-ratio: 300 / 415; 
            object-fit: cover; 
            display: block;
        }

        /* Modal 彈出視窗 */
        #img-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 2000; align-items: center; justify-content: center; flex-direction: column; }
        .modal-content { width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; background: var(--glass); border: 1px solid var(--accent); border-radius: 15px; padding: 20px; text-align: center; }
        .modal-content::-webkit-scrollbar { width: 8px; }
        .modal-content::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 4px; }
        
        .close-btn { position: absolute; top: 20px; right: 40px; font-size: 3rem; color: #fff; cursor: pointer; transition: 0.3s; z-index: 2100; }
        .close-btn:hover { color: var(--accent); }
        
        /* 彈出後的放大圖片 */
        .modal-focused-img { width: 100%; height: auto; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); }

        /* Footer */
        footer { padding: 60px 20px; border-top: 1px solid rgba(255,255,255,0.1); text-align: center; background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); width: 100%; box-sizing: border-box; }
        .footer-socials { display: inline-flex; gap: 20px; align-items: center; justify-content: center; flex-wrap: wrap; background: rgba(10, 15, 20, 0.6); border: 1px solid rgba(0, 242, 255, 0.2); padding: 10px 25px; border-radius: 50px; margin-bottom: 25px; }

        /* RWD 手機版 */
        @media (max-width: 768px) {
            nav { padding: 12px 20px; flex-wrap: wrap; justify-content: space-between; }
            .nav-links { gap: 20px; order: 3; width: 100%; justify-content: center; margin-top: 12px; }
            .nav-links a { font-size: 0.85rem; letter-spacing: 1px; }
            .nav-socials { padding: 4px 10px; gap: 6px; flex-wrap: wrap; max-width: 70%; justify-content: flex-end; }
            .social-icon { width: 28px; height: 28px; }
            .page-header { margin-top: 90px; padding: 15px; }
            .page-header h1 { font-size: 2.2rem; letter-spacing: 4px; }
            .page-header p { font-size: 0.85rem; letter-spacing: 1px; }
            .close-btn { top: 10px; right: 20px; }
            
            /* 手機版強制絕對 2 個一排 */
            .account-grid { 
                grid-template-columns: repeat(2, 1fr) !important; 
                gap: 12px !important; 
                padding: 0 10px !important; 
                margin-top: 20px; 
            }
            footer { padding: 40px 15px; }
            .footer-socials { gap: 12px; padding: 8px 20px; }
            .footer-socials .social-icon { width: 34px; height: 34px; }
        }
    </style>
</head>
<body>

    <iframe src="background.html" class="bg-iframe"></iframe>

    <div class="content-wrapper">
        <nav>
            <div class="nav-logo"><a href="index.html"><img src="LOGO.png" alt="LOGO"></a></div>
            <div class="nav-links">
                <a href="index.html">首頁返回</a>
                <a href="#accounts-grid">購買須知</a>
                <a href="三角洲.html">帳號一覽</a>
            </div>
            <div class="nav-socials">
                <a href="https://line.me/R/ti/p/@682gddht" target="_blank" title="LINE"><img src="https://img.icons8.com/color/48/line-me.png" alt="LINE" class="social-icon"></a>
                <a href="https://www.instagram.com/xiao_chen_1112?igsh=OXA5eXRsenVsZXN0&utm_source=qr" target="_blank" title="IG"><img src="https://img.icons8.com/fluency/48/instagram-new.png" alt="IG" class="social-icon"></a>
                <a href="https://www.facebook.com/chen.yuting.439481?locale=zh_TW" target="_blank" title="FB"><img src="https://img.icons8.com/fluency/48/facebook-new.png" alt="FB" class="social-icon"></a>
                <a href="https://www.tiktok.com/@chenyuting111" target="_blank" title="TK"><img src="https://img.icons8.com/fluency/48/tiktok.png" alt="TK" class="social-icon"></a>
                <a href="https://discord.gg/5ZGRXmfxwb" target="_blank" title="DC"><img src="https://img.icons8.com/fluency/48/discord-logo.png" alt="DC" class="social-icon"></a>
                <a href="https://www.threads.com/@xiao_chen_1112?igshid=NTc4MTIwNjQ2YQ==" target="_blank" title="Threads"><img src="https://img.icons8.com/ios-filled/48/ffffff/threads.png" alt="Threads" class="social-icon"></a>
            </div>
        </nav>

        <div class="page-header">
            <h1>PURCHASE NOTICE</h1>
            <p>購買須知與資產交易流程說明</p>
        </div>

        <div id="accounts-grid" class="account-grid">
            <div style="text-align: center; grid-column: 1 / -1;">
                <p style="color: var(--accent); letter-spacing: 2px; font-family: 'Orbitron', sans-serif;">載入須知圖片中...</p>
            </div>
        </div>
    </div> 

    <div id="img-modal" onclick="closeModal()">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <div class="modal-content" onclick="event.stopPropagation()">
            <img src="" id="modal-focused-target" class="modal-focused-img" alt="Focused Notice">
        </div>
    </div>

    <footer>
        <div class="footer-socials">
            <a href="https://line.me/R/ti/p/@682gddht" target="_blank" title="LINE"><img src="https://img.icons8.com/color/48/line-me.png" alt="LINE" class="social-icon"></a>
            <a href="https://www.instagram.com/xiao_chen_1112?igsh=OXA5eXRsenVsZXN0&utm_source=qr" target="_blank" title="IG"><img src="https://img.icons8.com/fluency/48/instagram-new.png" alt="IG" class="social-icon"></a>
            <a href="https://www.facebook.com/chen.yuting.439481?locale=zh_TW" target="_blank" title="FB"><img src="https://img.icons8.com/fluency/48/facebook-new.png" alt="FB" class="social-icon"></a>
            <a href="https://www.tiktok.com/@chenyuting111" target="_blank" title="TK"><img src="https://img.icons8.com/fluency/48/tiktok.png" alt="TK" class="social-icon"></a>
            <a href="https://discord.gg/5ZGRXmfxwb" target="_blank" title="DC"><img src="https://img.icons8.com/fluency/48/discord-logo.png" alt="DC" class="social-icon"></a>
            <a href="https://www.threads.com/@xiao_chen_1112?igshid=NTc4MTIwNjQ2YQ==" target="_blank" title="Threads"><img src="https://img.icons8.com/ios-filled/48/ffffff/threads.png" alt="Threads" class="social-icon"></a>
        </div>
        <p style="color:#777; font-size:0.8rem;">© 2026 ENENGAMES. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
        const API_KEY = "AIzaSyB0pjUimtoomamQ9BVPGwIB-36VNFlVlds";
        const MASTER_FOLDER_ID = "16CFWtuK-c16xAoU_1EIG3vos-mchBC9D";
        
        const grid = document.getElementById('accounts-grid');
        const modal = document.getElementById('img-modal');
        const modalImg = document.getElementById('modal-focused-target');

        // 網頁載入時直接撈取資料夾圖片
        document.addEventListener('DOMContentLoaded', function() {
            const query = encodeURIComponent(`'${MASTER_FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`);
            const fetchUrl = `https://www.googleapis.com/drive/v3/files?q=${query}&orderBy=name&supportsAllDrives=true&includeItemsFromAllDrives=true&key=${API_KEY}`;

            fetch(fetchUrl)
                .then(res => res.json())
                .then(data => {
                    if (data.error) {
                        grid.innerHTML = `
                            <div style="grid-column: 1 / -1; background: rgba(255, 50, 50, 0.15); border: 1px solid #ff4d4d; border-radius: 15px; padding: 30px; color: #ff4d4d; font-family: monospace;">
                                <h3 style="margin-top: 0;">⚠️ Google Drive API 連線失敗</h3>
                                <p>錯誤代碼: ${data.error.code}</p>
                                <p>詳細訊息: ${data.error.message}</p>
                            </div>
                        `;
                        return;
                    }

                    if (!data.files || data.files.length === 0) {
                        grid.innerHTML = `<div style="text-align: center; grid-column: 1 / -1;"><p style="color: #aaa;">資料夾中目前沒有任何須知圖片。</p></div>`;
                        return;
                    }

                    // 成功抓取後，渲染圖片卡片
                    grid.innerHTML = "";
                    data.files.forEach(file => {
                        const imgUrl = `https://drive.google.com/thumbnail?id=${file.id}&sz=w1000`;
                        grid.innerHTML += `
                            <div class="acc-card" onclick="zoomImage('${imgUrl}')">
                                <img src="${imgUrl}" alt="Notice Image" class="acc-cover" onerror="this.src='https://via.placeholder.com/300x415/151515/00f2ff?text=Image+Error'">
                            </div>
                        `;
                    });
                })
                .catch(err => {
                    grid.innerHTML = `<div style="text-align: center; grid-column: 1 / -1; color: red;">網路連線錯誤，無法取得資料。</div>`;
                    console.error("圖片載入失敗", err);
                });
        });

        // 點擊圖片直接放大
        function zoomImage(imgUrl) {
            modal.style.display = "flex";
            modalImg.src = imgUrl;
        }

        function closeModal() {
            modal.style.display = "none";
            modalImg.src = "";
        }
    </script>
</body>
</html>
